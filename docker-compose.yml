
version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: chatuser
      POSTGRES_PASSWORD: chatpass
      POSTGRES_DB: chatdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    command: sh -c "npm install && npm run dev"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://chatuser:chatpass@db:5432/chatdb
      JWT_SECRET: supersecret
    volumes:
      - ./backend:/app
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ./frontend:/app
    ports:
      - "3000:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
